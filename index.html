<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RiverWatch</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <!-- Intro -->

    <div id="intro" class="container">

        <div class="title">
            RiverWatch
        </div>

        <div class="subtitle">
            Financial Operation Center
        </div>

        <div class="version">
            Version 0.1.1
        </div>


        <div class="operator">

            Operator : NIMS

            <span class="online">

                ● ONLINE

            </span>

        </div>


        <div class="line"></div>


        <div class="philosophy">

            <p>Don't predict the river.</p>

            <p>Watch the river,</p>

            <p>and set a heading by the map.</p>

        </div>


        <div class="line"></div>


        <button onclick="showDashboard()">

            ENTER DASHBOARD

        </button>

    </div>



    <!-- Dashboard -->


    <div id="dashboard" class="container">


        <div class="title">

            RiverWatch

        </div>


        <div class="subtitle">

            Financial Operation Center

        </div>


        <div class="operator">

            Operator : NIMS

            <span class="online">

                ● ONLINE

            </span>

        </div>



        <div class="line"></div>



        <div class="dashboard-title">

            Portfolio Health

        </div>


        <div class="health">

            92%

        </div>



        <div class="dashboard-title">

            Sensor Health

        </div>



        <div class="health">

            100%

        </div>


        <div class="line"></div>



        <button onclick="showIntro()">

            BACK

        </button>



    </div>



<script src="script.js"></script>


</body>

</html>
